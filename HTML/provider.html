<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Add Your Mess — MessMate</title>

  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/provider.css">
  <link rel="stylesheet" href="../CSS/responsive.css">

  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav>

    <h2>MessMate</h2>

    <ul>

      <li><a href="index.html">Home</a></li>

      <li><a href="about.html">About</a></li>

      <li><a href="contact.html">Contact</a></li>

      <li>
        <a href="login.html"
           id="loginLink">
          Login
        </a>
      </li>

      <li>
        <a href="signup.html"
           id="signupLink">
          Signup
        </a>
      </li>

      <li>
        <a href="dashboard.html">
          Dashboard
        </a>
      </li>

      <li>
        <a href="provider.html">
          Provider
        </a>
      </li>

      <li>
        <a href="#"
           id="logoutBtn"
           style="display:none"
           onclick="logout()">

          Logout

        </a>
      </li>

    </ul>

  </nav>

  <!-- PROVIDER FORM -->
  <div class="provider-form">

    <div class="provider-card">

      <!-- LOGIN NOTICE -->
      <div class="login-notice"
           id="loginNotice">

        <p>
          You must be logged in to add a mess listing.
        </p>

        <a href="login.html">
          Login Now
        </a>

      </div>

      <!-- SUCCESS -->
      <div class="success-msg"
           id="successMsg">

        <i class="fa-solid fa-circle-check"></i>

        <h3>
          Mess Added Successfully!
        </h3>

        <p id="successName"></p>

        <a href="index.html">
          View on Home Page →
        </a>

      </div>

      <!-- FORM -->
      <div id="formSection">

        <h2>
          List Your Mess
        </h2>

        <form id="messForm">

          <!-- NAME -->
          <input
            type="text"
            id="messName"
            placeholder="Enter Mess Name"
            required
          >

          <!-- TYPE -->
          <select id="foodType" required>

            <option value="">
              Select food type
            </option>

            <option value="Veg">
              Veg
            </option>

            <option value="Non-Veg">
              Non-Veg
            </option>

            <option value="Both">
              Both
            </option>

          </select>

          <!-- PRICE -->
          <input
            type="number"
            id="price"
            placeholder="Monthly Price (₹)"
            required
          >

          <!-- LOCATION -->
          <input
            type="text"
            id="location"
            placeholder="Location"
            required
          >

          <!-- DESCRIPTION -->
          <textarea
            id="description"
            placeholder="Description"
          ></textarea>

          <!-- IMAGE -->
          <input
            type="file"
            id="image"
            accept="image/*"
          >

          <!-- IMAGE PREVIEW -->
          <img
            id="previewImage"

            style="
              width:100%;
              height:220px;
              object-fit:cover;
              border-radius:12px;
              margin-top:15px;
              display:none;
            "
          >

          <!-- SUBMIT -->
          <button
            type="submit"
            id="submitBtn"
          >

            Add Mess

          </button>

        </form>

      </div>

    </div>

  </div>

  <!-- FOOTER -->
  <footer>

    <h2>MessMate</h2>

    <p>
      Affordable food solutions for students.
    </p>

  </footer>

  <!-- SCRIPT -->
  <script>

    const API_URL =
      "http://127.0.0.1:5000/messes";

    // =========================
    // CHECK LOGIN
    // =========================
    function checkAuth() {

      const isLoggedIn =
        localStorage.getItem("isLoggedIn");

      if (!isLoggedIn) {

        document.getElementById(
          "loginNotice"
        ).style.display = "block";

        document.getElementById(
          "formSection"
        ).style.display = "none";

      }

      else {

        document.getElementById(
          "loginLink"
        ).style.display = "none";

        document.getElementById(
          "signupLink"
        ).style.display = "none";

        document.getElementById(
          "logoutBtn"
        ).style.display = "inline";

      }

    }

    // =========================
    // IMAGE PREVIEW
    // =========================
    document.getElementById(
      "image"
    ).addEventListener("change", (e) => {

      const file =
        e.target.files[0];

      if (!file) return;

      const reader =
        new FileReader();

      reader.onload = () => {

        const preview =
          document.getElementById(
            "previewImage"
          );

        preview.src =
          reader.result;

        preview.style.display =
          "block";

      };

      reader.readAsDataURL(file);

    });

    // =========================
    // BASE64 CONVERT
    // =========================
    function convertToBase64(file) {

      return new Promise((resolve, reject) => {

        const reader =
          new FileReader();

        reader.readAsDataURL(file);

        reader.onload = () =>
          resolve(reader.result);

        reader.onerror = error =>
          reject(error);

      });

    }

    // =========================
    // SUBMIT FORM
    // =========================
    document.getElementById(
      "messForm"
    ).addEventListener(
      "submit",
      async (e) => {

      e.preventDefault();

      const btn =
        document.getElementById(
          "submitBtn"
        );

      btn.disabled = true;

      btn.innerText =
        "Adding...";

      try {

        // IMAGE FILE
        const imageFile =
          document.getElementById(
            "image"
          ).files[0];

        let imageBase64 = "";

        // CONVERT IMAGE
        if (imageFile) {

          imageBase64 =
            await convertToBase64(
              imageFile
            );

        }

        // DATA
        const messData = {

          name:
            document.getElementById(
              "messName"
            ).value,

          type:
            document.getElementById(
              "foodType"
            ).value,

          price:
            document.getElementById(
              "price"
            ).value,

          location:
            document.getElementById(
              "location"
            ).value,

          description:
            document.getElementById(
              "description"
            ).value,

          image:
            imageBase64

        };

        // API CALL
        const res = await fetch(
          API_URL,
          {

            method: "POST",

            headers: {
              "Content-Type":
              "application/json"
            },

            body:
              JSON.stringify(messData)

          }
        );

        const result =
          await res.json();

        if (res.ok) {

          document.getElementById(
            "formSection"
          ).style.display = "none";

          document.getElementById(
            "successName"
          ).innerText =
            messData.name;

          document.getElementById(
            "successMsg"
          ).style.display = "block";

        }

        else {

          alert(
            result.error ||
            "Error adding mess"
          );

        }

      }

      catch (err) {

        console.log(err);

        alert(
          "Server not connected"
        );

      }

      btn.disabled = false;

      btn.innerText =
        "Add Mess";

    });

    // =========================
    // LOGOUT
    // =========================
    function logout() {

      localStorage.clear();

      window.location.href =
        "index.html";

    }

    // =========================
    // INIT
    // =========================
    checkAuth();

  </script>

  <script src="../JS/auth.js"></script>

</body>
</html>

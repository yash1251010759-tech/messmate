<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MessMate</title>

  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/responsive.css">
  <link rel="stylesheet" href="../CSS/all.min.css">

  <style>
    
    #messContainer{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:25px;
      margin-top:30px;
    }

    .mess-card{
      background:white;
      border-radius:18px;
      overflow:hidden;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
      transition:0.3s;
    }

    .mess-card:hover{
      transform:translateY(-5px);
    }

    .mess-card img{
      width:100%;
      height:220px;
      object-fit:cover;
    }

    .mess-content{
      padding:20px;
    }

    .btn-group{
      display:flex;
      gap:10px;
      margin-top:15px;
      flex-wrap:wrap;
    }

    .view-btn,.edit-btn,.delete-btn{
      border:none;
      padding:10px 16px;
      border-radius:8px;
      cursor:pointer;
      color:white;
    }

    .view-btn{ background:#ff7a00; }
    .edit-btn{ background:#3498db; }
    .delete-btn{ background:red; }
  </style>
</head>

<body>

<nav>
  <h2>MessMate</h2>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="about.html">About</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><a href="login.html" id="loginLink">Login</a></li>
    <li><a href="dashboard.html">Dashboard</a></li>
    <li><a href="provider.html">Provider</a></li>
    <li><a href="#" id="logoutBtn" style="display:none;" onclick="logout()">Logout</a></li>
  </ul>
</nav>

<section>
  <h1>Find Affordable Homemade Food Near Your Hostel</h1>
  <p>Discover trusted mess services</p>
</section>

<!-- SEARCH -->
<div style="text-align:center; margin:30px;">
  <input type="text" id="searchInput" placeholder="Search..." />
  <button onclick="searchMess()">Search</button>
</div>

<!-- MESSES -->
<section>
  <h2>Featured Mess Providers</h2>
  <div id="messContainer">
    <p>Loading mess providers...</p>
  </div>
</section>

<footer>
  <h2>MessMate</h2>
</footer>

<script>
/* =========================
   API URL (LIVE BACKEND)
========================= */
const API_URL = "https://messmate-1-j4dn.onrender.com";

/* =========================
   AUTH
========================= */
function checkAuth(){
  const isLoggedIn = localStorage.getItem("isLoggedIn");

  if(isLoggedIn){
    const loginLink = document.getElementById("loginLink");
    const logoutBtn = document.getElementById("logoutBtn");

    if(loginLink) loginLink.style.display = "none";
    if(logoutBtn) logoutBtn.style.display = "inline";
  }
}

function logout(){
  localStorage.clear();
  window.location.href = "index.html";
}

/* =========================
   LOAD MESSES
========================= */
async function loadMessProviders(){
  try{
    const res = await fetch(`${API_URL}/messes`);
    const data = await res.json();
    renderMesses(data);
  }
  catch(err){
    const container = document.getElementById("messContainer");
    if(container){
      container.innerHTML = "<p>Server not reachable</p>";
    }
    console.log(err);
  }
}

/* =========================
   RENDER MESSES
========================= */
function renderMesses(data){

  const container = document.getElementById("messContainer");
  if(!container) return;

  const isAdmin = localStorage.getItem("isAdmin") === "true";

  if(!data || data.length === 0){
    container.innerHTML = "<p>No mess found</p>";
    return;
  }

  container.innerHTML = "";

  data.forEach(mess => {
    container.innerHTML += `
      <div class="mess-card">
        <img src="${mess.image || '../images/mess1.jpg'}">

        <div class="mess-content">
          <h3>${mess.name}</h3>
          <p>📍 ${mess.location || "N/A"}</p>
          <p>🍽 ${mess.type || "Veg"}</p>
          <p>₹${mess.price}</p>
          <p>⭐ ${mess.rating || 4}</p>

          <div class="btn-group">
            <button class="view-btn" onclick="viewDetails('${mess._id}')">
              View
            </button>

            ${isAdmin ? `
              <button class="edit-btn" onclick="editMess('${mess._id}')">Edit</button>
              <button class="delete-btn" onclick="deleteMess('${mess._id}')">Delete</button>
            ` : ""}
          </div>
        </div>
      </div>
    `;
  });
}

/* =========================
   ACTIONS
========================= */
function viewDetails(id){
  window.location.href = `messdetails.html?id=${id}`;
}

async function deleteMess(id){
  if(!confirm("Delete this mess?")) return;

  try{
    await fetch(`${API_URL}/messes/${id}`, {
      method: "DELETE"
    });

    loadMessProviders();
  }
  catch(err){
    alert("Delete failed");
  }
}

async function editMess(id){

  const name = prompt("Enter name");
  const price = prompt("Enter price");
  const location = prompt("Enter location");

  if(!name || !price || !location) return;

  try{
    await fetch(`${API_URL}/messes/${id}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ name, price, location })
    });

    loadMessProviders();
  }
  catch(err){
    alert("Update failed");
  }
}

/* =========================
   SEARCH
========================= */
async function searchMess(){

  const input = document.getElementById("searchInput");
  const query = input ? input.value.toLowerCase() : "";

  const res = await fetch(`${API_URL}/messes`);
  let data = await res.json();

  if(query){
    data = data.filter(m =>
      (m.name || "").toLowerCase().includes(query) ||
      (m.location || "").toLowerCase().includes(query)
    );
  }

  renderMesses(data);
}

/* ENTER KEY SEARCH */
const searchInput = document.getElementById("searchInput");
if(searchInput){
  searchInput.addEventListener("keypress", (e) => {
    if(e.key === "Enter"){
      searchMess();
    }
  });
}

/* INIT */
checkAuth();
loadMessProviders();

</script>

</body>
</html>
